name: CI/CD Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train model (needed for tests)
        run: python model/train.py
      - name: Run pytest
        run: pytest tests/ -v --tb=short
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ github.sha }} \
            -t egypt-price-predictor:${{ github.sha }} \
            -t egypt-price-predictor:latest \
            .
      - name: Start container
        run: |
          docker run -d \
            --name predictor \
            -p 5000:5000 \
            egypt-price-predictor:latest
      - name: Wait for startup
        run: sleep 5
      - name: Health check
        run: curl -f http://localhost:5000/health
      - name: Smoke test prediction
        run: |
          curl -f -X POST http://localhost:5000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "area": "New Cairo",
              "property_type": "Apartment",
              "size_m2": 150,
              "bedrooms": 3,
              "bathrooms": 2,
              "floor": 5,
              "age_years": 3,
              "has_garage": 1,
              "has_elevator": 1,
              "has_pool": 0
            }'
      - name: Print container logs
        if: failure()
        run: docker logs predictor
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
